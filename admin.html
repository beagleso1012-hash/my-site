/* 로컬 캐시 (빠른 읽기용) */
function getDB(){
  try{const d=localStorage.getItem(DB_KEY);if(d){const p=JSON.parse(d);COLLECTIONS.forEach(c=>{if(!p[c])p[c]=[];});if(!p._nextId)p._nextId=100;return p;}}catch(e){}
  const init={requests:[],children:[],helpers:DEFAULT_HELPERS,bookings:[],callRequests:[],_nextId:100};
  localStorage.setItem(DB_KEY,JSON.stringify(init));return init;
}
function saveDB(db){
  localStorage.setItem(DB_KEY,JSON.stringify(db));
  /* Firestore에 비동기 저장 */
  syncToFirestore(db);
}
function genId(db){const id="id_"+(db._nextId++);return id;}

/* ── Firestore 동기화 함수들 ── */
function syncToFirestore(db){
  COLLECTIONS.forEach(col=>{
    const items=db[col]||[];
    items.forEach(item=>{
      if(!item.id)return;
      firestore.collection(col).doc(item.id).set(item,{merge:true}).catch(e=>console.warn("Firestore write error:",e));
    });
  });
  /* _nextId 메타 저장 */
  firestore.collection("_meta").doc("counter").set({_nextId:db._nextId||100}).catch(()=>{});
}

/* Firestore에서 전체 데이터 불러오기 (앱 시작시 1회) */
async function loadFromFirestore(){
  try{
    const db=getDB();let changed=false;
    for(const col of COLLECTIONS){
      const snap=await firestore.collection(col).get();
      if(!snap.empty){
        const items=[];snap.forEach(doc=>items.push(doc.data()));
        if(items.length>0){db[col]=items;changed=true;}
      }
    }
    /* _nextId 복원 */
    const metaSnap=await firestore.collection("_meta").doc("counter").get();
    if(metaSnap.exists){const m=metaSnap.data();if(m._nextId)db._nextId=Math.max(db._nextId||100,m._nextId);}
    /* 기본 도우미가 Firestore에 없으면 업로드 */
    if((db.helpers||[]).length===0){db.helpers=DEFAULT_HELPERS;changed=true;}
    if(changed){localStorage.setItem(DB_KEY,JSON.stringify(db));}
    console.log("✅ Firestore 동기화 완료! 컬렉션:", COLLECTIONS.map(c=>`${c}(${(db[c]||[]).length})`).join(", "));
    return db;
  }catch(e){console.warn("Firestore load 실패 (로컬 데이터 사용):",e);return getDB();}
}

/* Firestore에서 삭제된 항목 제거 */
function removeFromFirestore(collection,docId){
  firestore.collection(collection).doc(docId).delete().catch(e=>console.warn("Firestore delete error:",e));
}

function downloadExcel(data, headers, filename){
  const ws=XLSX.utils.aoa_to_sheet([headers,...data]);
  /* 컬럼 너비 자동 조정 */
  const colW=headers.map((h,i)=>{let max=h.length;data.forEach(r=>{const v=String(r[i]||"");if(v.length>max)max=v.length;});return {wch:Math.min(max+4,40)};});
  ws["!cols"]=colW;
  /* 헤더 스타일 (볼드) — SheetJS 무료버전 제한으로 기본 적용 */
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Sheet1");
  XLSX.writeFile(wb,filename);
}

/* ══════════════
   Polling Hook
   ══════════════ */
function usePolling(ms){
  const [data,setData]=useState({requests:[],helpers:[],bookings:[],callRequests:[],stats:{}});
  const [fireLoaded,setFireLoaded]=useState(false);
  const load=useCallback(()=>{
    const db=getDB();
    setData({requests:db.requests||[],helpers:db.helpers||[],bookings:db.bookings||[],callRequests:db.callRequests||[],stats:{
      totalRequests:(db.requests||[]).length,
      newCount:(db.requests||[]).filter(r=>r.status==="applied").length,
      consultingCount:(db.requests||[]).filter(r=>r.status==="consulting").length,
      matchedCount:(db.requests||[]).filter(r=>r.status==="matched").length,
      inProgressCount:(db.requests||[]).filter(r=>r.status==="in_progress").length,
      totalHelpers:(db.helpers||[]).length,
      pendingCalls:(db.callRequests||[]).filter(c=>c.status==="pending").length,
      totalBookings:(db.bookings||[]).length,
    }});
  },[]);
  useEffect(()=>{
    /* 앱 시작시 Firestore에서 데이터 불러오기 */
    loadFromFirestore().then(()=>{setFireLoaded(true);load();});
  },[]);
  useEffect(()=>{if(fireLoaded){const iv=setInterval(load,ms);return()=>clearInterval(iv);}},[ms,load,fireLoaded]);
  return {...data,reload:load};
}

function mask(s){if(!s||s.startsWith("["))return s;if(s.length<=2)return"**";return s[0]+"*".repeat(s.length-2)+s[s.length-1];}

function fmt(d){return d.toISOString().slice(0,10);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function getDaysInRange(s,e){const days=[];let c=new Date(s);const end=new Date(e);while(c<=end){days.push(fmt(c));c=addDays(c,1);}return days;}
function getWeekStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());return r;}

function getFreshBookings(){return (getDB().bookings||[]);}
function isHelperBusyOnDate(hId,dateStr,bookings,startTime,endTime){
  const bks=bookings||getFreshBookings();
  return bks.some(b=>{
    if(b.helperId!==hId||b.status!=="active"||!b.startDate||!b.endDate)return false;
    if(dateStr<b.startDate||dateStr>b.endDate)return false;
    if(startTime&&endTime&&b.startTime&&b.endTime){return startTime<b.endTime&&b.startTime<endTime;}
    return true;
  });
}
function isHelperBusyInRange(hId,sd,ed,bookings,startTime,endTime){
  if(!sd||!ed)return false;
  const bks=bookings||getFreshBookings();
  const days=getDaysInRange(sd,ed);
  return days.some(d=>isHelperBusyOnDate(hId,d,bks,startTime,endTime));
}

function Requests({requests,helpers,bookings:allBookings,reload}){

  const getUncoveredDates=(reqId,reqSD,reqED)=>{if(!reqSD||!reqED)return[];const allDays=getDaysInRange(reqSD,reqED);const bks=getReqBookings(reqId);return allDays.filter(d=>!bks.some(b=>b.startDate&&b.endDate&&d>=b.startDate&&d<=b.endDate));};
  /* 같은 신청의 같은 날짜에 시간 겹침 체크 (1일 1명만 해당 시간대) */
  const toMin=t=>{const p=(t||"09:00").split(":");return parseInt(p[0])*60+parseInt(p[1]||0);};
  const minToStr=m=>String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
  const hasTimeOverlapInReq=(reqId,newSD,newED,newST,newET,excludeId)=>{
    const existing=getReqBookings(reqId).filter(b=>b.id!==excludeId);
    return existing.some(b=>{if(!b.startDate||!b.endDate)return false;if(newSD>b.endDate||b.startDate>newED)return false;if(newST&&newET&&b.startTime&&b.endTime)return newST<b.endTime&&b.startTime<newET;return true;});
  };
  /* 특정 날짜의 빈 시간 계산 */
  const getDayGaps=(reqId,dateStr,defST,defET,excludeId)=>{
    const bks=getReqBookings(reqId).filter(b=>b.id!==excludeId&&b.startDate&&b.endDate&&dateStr>=b.startDate&&dateStr<=b.endDate).sort((a,b)=>(a.startTime||"").localeCompare(b.startTime||""));
    const minS=toMin(defST),maxE=toMin(defET);const gaps=[];let cursor=minS;
    bks.forEach(bk=>{const bS=toMin(bk.startTime||defST),bE=toMin(bk.endTime||defET);if(bS>cursor)gaps.push({s:cursor,e:bS});cursor=Math.max(cursor,bE);});
    if(cursor<maxE)gaps.push({s:cursor,e:maxE});
    return gaps;
  };
  const updateReq=(id,updates)=>{const db=getDB();const idx=db.requests.findIndex(r=>r.id===id);if(idx<0)return;db.requests[idx]={...db.requests[idx],...updates};saveDB(db);reload();setSel(db.requests[idx]);};
  const saveMemo=()=>{if(!sel)return;const db=getDB();const idx=db.requests.findIndex(r=>r.id===sel.id);if(idx<0)return;if(!db.requests[idx].memos)db.requests[idx].memos=[];db.requests[idx].memos.push({text:memoText,createdAt:new Date().toISOString()});saveDB(db);reload();setSel(db.requests[idx]);setMemoText("");};

            <td className="px-4 py-3">{rBks.length>0?<span className="text-xs text-green-600 font-semibold">{rBks.length}명</span>:<span className="text-xs text-gray-400">-</span>}</td>

              {allDays.map(d=>{

                        <span className="text-xs font-bold text-gray-700">{g.startDate===g.endDate?g.startDate.slice(5):`${g.startDate.slice(5)}~${g.endDate.slice(5)}`}</span>

                      </div>
                      <div className="flex items-center gap-1">
                        <button onClick={()=>{const gaps=getDayGaps(sel.id,g.startDate,sel.startTime||"09:00",sel.endTime||"18:00",null);if(gaps.length>0){setBookingModal(true);setBkError("");setBkForm({startDate:g.startDate,endDate:g.endDate,startTime:minToStr(gaps[0].s),endTime:minToStr(gaps[0].e),helperId:"",fee:""});}else{setBookingModal(true);setBkError("이 날짜에 빈 시간이 없습니다.");setBkForm({startDate:g.startDate,endDate:g.endDate,startTime:g.startTime,endTime:g.endTime,helperId:"",fee:""});}}} className="w-5 h-5 flex items-center justify-center rounded bg-indigo-50 text-indigo-500 hover:bg-indigo-100 text-xs font-bold" title="이 일시에 도우미 추가">+</button>
                        <button onClick={()=>{removeBooking(g.items[g.items.length-1].id);}} className="w-5 h-5 flex items-center justify-center rounded bg-red-50 text-red-500 hover:bg-red-100 text-xs font-bold" title="마지막 도우미 삭제">-</button>
                      </div>
                    </div>
                    {g.items.map(b=>{const h=helpers.find(x=>x.id===b.helperId);const ci=hCI[b.helperId]||0;return <div key={b.id} className="flex items-center justify-between pl-2 py-1 rounded hover:bg-white group cursor-pointer" onClick={()=>openEditBk(b)}>
                      <div className="flex items-center gap-2 flex-1 min-w-0">
                        <span className={`w-2 h-2 rounded-full flex-shrink-0 ${dotBg[ci%dotBg.length]}`}/>
                        <span className="text-xs font-semibold">{h?h.name:"?"}</span>
                        {h&&<span className="text-xs text-yellow-500">{"\u2B50"}{h.rating}</span>}
                        <span className="text-xs text-indigo-400 opacity-0 group-hover:opacity-100">{"\u270E"}</span>
                      </div>
                      <button onClick={(e)=>{e.stopPropagation();removeBooking(b.id);}} className="text-red-400 hover:text-red-600 text-xs px-2 py-0.5 rounded hover:bg-red-50 opacity-0 group-hover:opacity-100 transition flex items-center gap-0.5">{"\u2715"} 삭제</button>
                    </div>;})}
                  </div>)}
                </div>;
              })()}
              {uncovered.length>0&&<p className="text-xs text-red-500 mt-2 font-semibold">{"\u26A0\uFE0F"} 미배정 {uncovered.length}일</p>}
            </div>;
          })():<p className="text-xs text-gray-400 py-2">신청 기간이 설정되면 일정표가 표시됩니다.</p>}

    {/* Message Modal */}
    {msgModal&&<div className="modal-overlay" onClick={()=>setMsgModal(false)}><div className="modal-box" onClick={e=>e.stopPropagation()}>

      <div className="flex gap-2 mb-3 flex-wrap">{TEMPLATES.map((t,i)=><button key={i} onClick={()=>{setMsgTpl(t.name);setMsgText(t.body);}} className={`px-3 py-1 rounded-lg text-xs border transition ${msgTpl===t.name?"bg-indigo-50 border-indigo-300":"border-gray-200 hover:bg-gray-50"}`}>{t.name}</button>)}</div>
      <TA label="내용" value={msgText} onChange={e=>setMsgText(e.target.value)} rows={4}/><div className="flex gap-2 mt-3"><Btn onClick={sendMsg} disabled={!msgText}>전송</Btn><Btn v="secondary" onClick={()=>setMsgModal(false)}>취소</Btn></div>
    </div></div>}

    {/* Booking Modal (도우미 추가) */}
    {bookingModal&&(()=>{
      const db=getDB();const allBk=db.bookings||[];const sd=bkForm.startDate,ed=bkForm.endDate,st=bkForm.startTime,et=bkForm.endTime;
      const existingBks=allBk.filter(b=>b.requestId===sel.id&&b.status==="active");
      const timeOverlap=sd&&ed&&st&&et&&hasTimeOverlapInReq(sel.id,sd,ed,st,et,null);
      const gapInfo=(sd&&ed)?(()=>{const gaps=getDayGaps(sel.id,sd,sel.startTime||"09:00",sel.endTime||"18:00",null);return gaps;})():[];
      const availH=(sd&&ed)?helpers.filter(h=>!isHelperBusyInRange(h.id,sd,ed,allBk,st,et)):helpers;
      const busyH=(sd&&ed)?helpers.filter(h=>isHelperBusyInRange(h.id,sd,ed,allBk,st,et)):[];
      const alreadyAssigned=(sd&&ed)?existingBks.filter(b=>{if(!b.startDate||!b.endDate)return false;if(sd>b.endDate||b.startDate>ed)return false;if(st&&et&&b.startTime&&b.endTime)return st<b.endTime&&b.startTime<et;return true;}):[];
      return <div className="modal-overlay" onClick={()=>setBookingModal(false)}><div className="modal-box" onClick={e=>e.stopPropagation()}>
        <h3 className="font-bold text-lg mb-2">도우미 추가</h3>
        <p className="text-xs text-gray-500 mb-3">{sel.name} | 전체 기간: {sel.startDate||"미정"} ~ {sel.endDate||"미정"}</p>
        {existingBks.length>0&&<div className="bg-gray-50 rounded-lg p-3 mb-3"><p className="text-xs font-semibold text-gray-600 mb-2">이미 배정됨 ({existingBks.length}명)</p><div className="space-y-1">{existingBks.sort((a,b)=>(a.startDate||"").localeCompare(b.startDate||"")).map(b=>{const h=helpers.find(x=>x.id===b.helperId);return <div key={b.id} className="flex items-center gap-2 text-xs"><span className="w-2 h-2 rounded-full bg-green-400"/><span className="font-medium">{h?h.name:"?"}</span><span className="text-gray-400">{b.startDate}~{b.endDate} {b.startTime}~{b.endTime}</span></div>;})}</div></div>}
        <div className="grid grid-cols-2 gap-3"><Inp label="시작일" type="date" value={bkForm.startDate} onChange={e=>{setBkForm(p=>({...p,startDate:e.target.value}));setBkError("");}}/><Inp label="종료일" type="date" value={bkForm.endDate} onChange={e=>{setBkForm(p=>({...p,endDate:e.target.value}));setBkError("");}}/></div>
        {timeOverlap&&<p className="text-xs text-red-600 bg-red-50 rounded-lg p-2">{"\u26A0\uFE0F"} 해당 시간대에 이미 도우미가 배정되어 있습니다.</p>}
        {sd&&ed&&gapInfo.length>0&&!timeOverlap&&<p className="text-xs text-blue-600 bg-blue-50 rounded-lg p-2">{"\u{1F4CB}"} 빈 시간: {gapInfo.map(g=>minToStr(g.s)+"~"+minToStr(g.e)).join(", ")}</p>}
        {sd&&ed&&gapInfo.length===0&&existingBks.length>0&&<p className="text-xs text-orange-600 bg-orange-50 rounded-lg p-2">{"\u26A0\uFE0F"} 이 날짜에 빈 시간이 없습니다.</p>}
        <div className="grid grid-cols-2 gap-3"><Inp label="시작시간" type="time" value={bkForm.startTime} onChange={e=>setBkForm(p=>({...p,startTime:e.target.value}))}/><Inp label="종료시간" type="time" value={bkForm.endTime} onChange={e=>setBkForm(p=>({...p,endTime:e.target.value}))}/></div>
        {sd&&ed&&<p className="text-xs mb-2">{availH.length>0?<span className="text-green-600 font-semibold">{"\u2705"} 가능 {availH.length}명</span>:<span className="text-red-600 font-semibold">{"\u26A0\uFE0F"} 가능한 도우미 없음</span>}</p>}
        <label className="block text-xs font-medium text-gray-600 mb-1">도우미</label>
        <div className="space-y-1 mb-3 max-h-40 overflow-y-auto">{availH.map(h=><button key={h.id} onClick={()=>{setBkForm(p=>({...p,helperId:h.id}));setBkError("");}} className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg border text-left text-xs transition ${bkForm.helperId===h.id?"border-indigo-400 bg-indigo-50":"border-gray-200 hover:bg-gray-50"}`}><span className="font-semibold">{h.name}</span><span className="text-gray-400">{h.area} | {"\u2B50"}{h.rating}</span></button>)}{busyH.length>0&&<div className="border-t mt-2 pt-2"><p className="text-xs text-gray-400 mb-1">다른 예약 겹침 ({busyH.length}명)</p>{busyH.map(h=><div key={h.id} className="px-3 py-1 text-xs text-gray-400 line-through">{h.name}</div>)}</div>}</div>
        <Inp label="금액 (원)" type="number" placeholder="비워두면 자동" value={bkForm.fee} onChange={e=>setBkForm(p=>({...p,fee:e.target.value}))}/>
        {bkError&&<p className="text-xs text-red-600 font-semibold bg-red-50 rounded-lg p-2">{bkError}</p>}
        <div className="flex gap-2 mt-3"><Btn onClick={addBooking} disabled={!bkForm.helperId||timeOverlap}>추가</Btn><Btn v="secondary" onClick={()=>setBookingModal(false)}>취소</Btn></div>
      </div></div>;
    })()}

    {/* Edit Booking Modal */}
    {editBkModal&&(()=>{
      const db=getDB();const allBk=db.bookings||[];
      const esd=editBkForm.startDate,eed=editBkForm.endDate,est=editBkForm.startTime,eet=editBkForm.endTime;
      const availH=(esd&&eed)?helpers.filter(h=>h.id===editBkModal.helperId||!isHelperBusyInRange(h.id,esd,eed,allBk.filter(b=>b.id!==editBkModal.id),est,eet)):helpers;
      const busyH=(esd&&eed)?helpers.filter(h=>h.id!==editBkModal.helperId&&isHelperBusyInRange(h.id,esd,eed,allBk.filter(b=>b.id!==editBkModal.id),est,eet)):[];
      return <div className="modal-overlay" onClick={()=>setEditBkModal(null)}><div className="modal-box" onClick={e=>e.stopPropagation()}>
        <h3 className="font-bold text-lg mb-2">예약 수정</h3>
        <p className="text-xs text-gray-500 mb-3">{sel.name} | 기존: {editBkModal.startDate}~{editBkModal.endDate} {editBkModal.startTime}~{editBkModal.endTime}</p>
        <div className="grid grid-cols-2 gap-3"><Inp label="시작일" type="date" value={editBkForm.startDate} onChange={e=>setEditBkForm(p=>({...p,startDate:e.target.value}))}/><Inp label="종료일" type="date" value={editBkForm.endDate} onChange={e=>setEditBkForm(p=>({...p,endDate:e.target.value}))}/></div>
        <div className="grid grid-cols-2 gap-3"><Inp label="시작시간" type="time" value={editBkForm.startTime} onChange={e=>setEditBkForm(p=>({...p,startTime:e.target.value}))}/><Inp label="종료시간" type="time" value={editBkForm.endTime} onChange={e=>setEditBkForm(p=>({...p,endTime:e.target.value}))}/></div>
        {esd&&eed&&<p className="text-xs mb-2">{availH.length>0?<span className="text-green-600 font-semibold">{"\u2705"} 가능 {availH.length}명</span>:<span className="text-red-600 font-semibold">{"\u26A0\uFE0F"} 가능한 도우미 없음</span>}</p>}
        <label className="block text-xs font-medium text-gray-600 mb-1">도우미</label>
        <div className="space-y-1 mb-3 max-h-40 overflow-y-auto">
          {availH.map(h=><button key={h.id} onClick={()=>{setEditBkForm(p=>({...p,helperId:h.id}));setBkError("");}} className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg border text-left text-xs transition ${editBkForm.helperId===h.id?"border-indigo-400 bg-indigo-50":"border-gray-200 hover:bg-gray-50"}`}><span className="font-semibold">{h.name}</span><span className="text-gray-400">{h.area} | {"\u2B50"}{h.rating}</span>{h.id===editBkModal.helperId&&<span className="text-indigo-500 text-xs">(현재)</span>}</button>)}
          {busyH.length>0&&<div className="border-t mt-2 pt-2"><p className="text-xs text-gray-400 mb-1">겹침 ({busyH.length}명)</p>{busyH.map(h=><div key={h.id} className="px-3 py-1 text-xs text-gray-400 line-through">{h.name}</div>)}</div>}
        </div>
        <Inp label="금액 (원)" type="number" value={editBkForm.fee} onChange={e=>setEditBkForm(p=>({...p,fee:e.target.value}))}/>
        {bkError&&<p className="text-xs text-red-600 font-semibold bg-red-50 rounded-lg p-2">{bkError}</p>}
        <div className="flex gap-2 mt-3"><Btn onClick={saveEditBk}>저장</Btn><Btn v="danger" onClick={()=>{setEditBkModal(null);removeBooking(editBkModal.id);}}>삭제</Btn><Btn v="secondary" onClick={()=>setEditBkModal(null)}>취소</Btn></div>
      </div></div>;
    })()}
  </div>;
}

/* ═════════════════════════════
   3. Call Request Management
   ═════════════════════════════ */
function CallManage({callRequests,reload}){
  const [filter,setFilter]=useState("all");const [sel,setSel]=useState(null);const [memoText,setMemoText]=useState("");
  const filtered=(callRequests||[]).filter(c=>filter==="all"||c.status===filter).slice().reverse();
  const updateCall=(id,updates)=>{const db=getDB();if(!db.callRequests)db.callRequests=[];const idx=db.callRequests.findIndex(c=>c.id===id);if(idx<0)return;db.callRequests[idx]={...db.callRequests[idx],...updates};saveDB(db);reload();setSel(db.callRequests[idx]);};
  const addMemo=(id)=>{const db=getDB();const idx=db.callRequests.findIndex(c=>c.id===id);if(idx<0)return;if(!db.callRequests[idx].memos)db.callRequests[idx].memos=[];db.callRequests[idx].memos.push({text:memoText,createdAt:new Date().toISOString()});saveDB(db);reload();setSel(db.callRequests[idx]);setMemoText("");};
  if(sel)return <div className="fade-in space-y-4">
    <button onClick={()=>setSel(null)} className="flex items-center gap-1 text-sm text-indigo-600 hover:text-indigo-800 font-medium">{"\u25C0"} 목록으로</button>
    <div className="bg-white rounded-xl border border-gray-100 p-5 space-y-3">
      <div className="flex items-center justify-between"><h3 className="font-bold">{sel.name}</h3><Badge status={sel.status} map={CALL_ST}/></div>
      <p className="text-sm text-gray-600">{sel.phone}</p>
      {sel.message&&<div className="bg-gray-50 rounded-lg p-3 text-sm">{sel.message}</div>}
      <div className="flex gap-2 flex-wrap">{[["called","통화완료"],["converted","신청전환"],["closed","종료"]].filter(([s])=>s!==sel.status).map(([s,l])=><Btn key={s} v={s==="closed"?"danger":"primary"} onClick={()=>updateCall(sel.id,{status:s})}>{l}</Btn>)}</div>
      <div className="max-h-40 overflow-y-auto space-y-2">{(sel.memos||[]).slice().reverse().map((m,i)=><div key={i} className="bg-gray-50 rounded-lg p-3"><p className="text-sm whitespace-pre-wrap">{m.text}</p><p className="text-xs text-gray-400 mt-1">{new Date(m.createdAt).toLocaleDateString("ko-KR")}</p></div>)}</div>
      <div className="flex gap-2"><textarea value={memoText} onChange={e=>setMemoText(e.target.value)} rows={2} placeholder="메모 입력..." className="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm resize-none"/><Btn onClick={()=>addMemo(sel.id)} disabled={!memoText.trim()} cls="self-end">저장</Btn></div>
    </div>
  </div>;
  return <div className="fade-in space-y-4">
    <div className="flex items-center justify-between"><h2 className="text-xl font-bold text-gray-900">전화 상담 관리</h2><button onClick={()=>exportCalls(callRequests)} className="px-3 py-1.5 rounded-lg text-xs font-medium bg-green-50 text-green-700 border border-green-200 hover:bg-green-100 transition flex items-center gap-1">{"\u{1F4E5}"} 엑셀</button></div>
    <div className="flex gap-2">{[["all","전체"],["pending","대기"],["called","통화완료"],["converted","신청전환"],["closed","종료"]].map(([v,l])=><button key={v} onClick={()=>setFilter(v)} className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${filter===v?"bg-indigo-500 text-white":"bg-white text-gray-600 border border-gray-200 hover:bg-gray-50"}`}>{l}</button>)}</div>
    {filtered.length===0?<p className="text-sm text-gray-400 py-8 text-center">상담 내역이 없습니다</p>:<div className="space-y-2">{filtered.map(c=><div key={c.id} onClick={()=>{setSel(c);setMemoText("");}} className="bg-white rounded-xl border border-gray-100 p-4 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition"><div><p className="font-semibold text-sm">{c.name}</p><p className="text-xs text-gray-500">{c.phone} | {new Date(c.createdAt).toLocaleDateString("ko-KR")}</p></div><Badge status={c.status} map={CALL_ST}/></div>)}</div>}
  </div>;
}

/* ═══════════════
   4. Helpers
   ═══════════════ */
function Helpers({helpers,reload}){
  const [editing,setEditing]=useState(null);const blank={name:"",phone:"",gender:"여",bank:"",account:"",career:"",availableTime:"09:00~18:00",area:"",rating:4.5,note:""};
  const [f,setF]=useState(blank);const up=(k,v)=>setF(p=>({...p,[k]:v}));
  const startEdit=(h)=>{setEditing(h.id);setF({name:h.name||"",phone:h.phone||"",gender:h.gender||"여",bank:h.bank||"",account:h.account||"",career:h.career||"",availableTime:h.availableTime||"",area:h.area||"",rating:h.rating||4.5,note:h.note||""});};
  const save=()=>{const db=getDB();if(editing==="new"){db.helpers.push({id:genId(db),...f,rating:Number(f.rating)});}else{const idx=db.helpers.findIndex(h=>h.id===editing);if(idx>=0)db.helpers[idx]={...db.helpers[idx],...f,rating:Number(f.rating)};}saveDB(db);reload();setEditing(null);};
  const del=(id)=>{if(!confirm("삭제하시겠습니까?"))return;const db=getDB();db.helpers=db.helpers.filter(h=>h.id!==id);saveDB(db);removeFromFirestore("helpers",id);reload();};
  return <div className="fade-in space-y-4">
    <div className="flex items-center justify-between"><h2 className="text-xl font-bold text-gray-900">도우미 관리</h2><div className="flex items-center gap-2"><button onClick={()=>exportHelpers(helpers)} className="px-3 py-1.5 rounded-lg text-xs font-medium bg-green-50 text-green-700 border border-green-200 hover:bg-green-100 transition flex items-center gap-1">{"\u{1F4E5}"} 엑셀</button><Btn onClick={()=>{setEditing("new");setF(blank);}}>+ 추가</Btn></div></div>
    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">{helpers.map(h=><div key={h.id} className="bg-white rounded-xl border border-gray-100 p-4 space-y-2">
      <div className="flex items-center justify-between"><p className="font-bold">{h.name}</p><span className="text-xs text-yellow-600">{"\u2B50"} {h.rating}</span></div>
      <div className="text-xs text-gray-500 space-y-1"><p>{h.phone}</p><p>{h.career}</p><p>{h.area} | {h.availableTime}</p>{h.note&&<p className="text-gray-400">{h.note}</p>}</div>
      <div className="flex gap-2"><Btn v="secondary" onClick={()=>startEdit(h)}>수정</Btn><Btn v="danger" onClick={()=>del(h.id)}>삭제</Btn></div>
    </div>)}</div>
    {editing!==null&&<div className="modal-overlay" onClick={()=>setEditing(null)}><div className="modal-box" onClick={e=>e.stopPropagation()}>
      <h3 className="font-bold text-lg mb-4">{editing==="new"?"도우미 추가":"도우미 수정"}</h3>
      <Inp label="이름" value={f.name} onChange={e=>up("name",e.target.value)}/><Inp label="연락처" value={f.phone} onChange={e=>up("phone",e.target.value)}/>
      <Sel label="성별" value={f.gender} onChange={e=>up("gender",e.target.value)} options={[{value:"여",label:"여성"},{value:"남",label:"남성"}]}/>
      <Inp label="은행" value={f.bank} onChange={e=>up("bank",e.target.value)}/><Inp label="계좌번호" value={f.account} onChange={e=>up("account",e.target.value)}/>
      <TA label="경력" value={f.career} onChange={e=>up("career",e.target.value)}/>
      <Inp label="활동시간" value={f.availableTime} onChange={e=>up("availableTime",e.target.value)} placeholder="09:00~18:00"/>
      <Inp label="활동지역" value={f.area} onChange={e=>up("area",e.target.value)}/>
      <Inp label="평점" type="number" min="0" max="5" step="0.1" value={f.rating} onChange={e=>up("rating",e.target.value)}/>
      <TA label="메모" value={f.note} onChange={e=>up("note",e.target.value)}/>
      <div className="flex gap-2 mt-4"><Btn onClick={save}>저장</Btn><Btn v="secondary" onClick={()=>setEditing(null)}>취소</Btn></div>
    </div></div>}
  </div>;
}

/* ═══════════════════════════
   5. Booking & Settlement
   ═══════════════════════════ */
function Settlement({bookings,helpers,requests,reload}){
  const [memoId,setMemoId]=useState(null);const [memoText,setMemoText]=useState("");
  const [filter,setFilter]=useState("all");
  const updateBooking=(id,updates)=>{const db=getDB();const idx=db.bookings.findIndex(b=>b.id===id);if(idx>=0){db.bookings[idx]={...db.bookings[idx],...updates};saveDB(db);reload();}};
  const saveBkMemo=(id)=>{const db=getDB();const idx=db.bookings.findIndex(b=>b.id===id);if(idx>=0){db.bookings[idx].memo=(db.bookings[idx].memo?db.bookings[idx].memo+"\n":"")+`[${new Date().toLocaleString("ko-KR")}] ${memoText}`;saveDB(db);reload();}setMemoId(null);setMemoText("");};
  const settlementRequests=requests.filter(r=>{if(r.status==="done_post")return true;if((r.status==="suspended"||r.status==="cancelled")&&Number(r.cancelFee)>0)return true;return false;});
  const reqFeeMap={};requests.forEach(r=>{const baseFee=Number(r.baseFee)||0;const deposit=Number(r.deposit)||0;const extraFee=Number(r.extraFee)||0;const cancelFee=Number(r.cancelFee)||0;const grandTotal=baseFee+extraFee;const reqBks=bookings.filter(b=>b.requestId===r.id&&b.status==="active");reqFeeMap[r.id]={name:r.name,status:r.status,deposit,baseFee,extraFee,cancelFee,grandTotal,bookingCount:reqBks.length,settled:reqBks.filter(b=>b.settlementStatus==="completed").length,pending:reqBks.filter(b=>b.settlementStatus!=="completed").length};});
  const allReqsWithBookings=settlementRequests.filter(r=>bookings.some(b=>b.requestId===r.id&&b.status==="active")||Number(r.cancelFee)>0);
  const totals=allReqsWithBookings.reduce((acc,r)=>{const f=reqFeeMap[r.id];if(!f)return acc;acc.deposit+=f.deposit;acc.baseFee+=f.baseFee;acc.extraFee+=f.extraFee;acc.cancelFee+=f.cancelFee;acc.grandTotal+=f.grandTotal;return acc;},{deposit:0,baseFee:0,extraFee:0,cancelFee:0,grandTotal:0});
  const settlementReqIds=new Set(settlementRequests.map(r=>r.id));
  const settlementBookings=bookings.filter(b=>settlementReqIds.has(b.requestId));
  const filtered=settlementBookings.filter(b=>{const r=requests.find(x=>x.id===b.requestId);if(filter==="done_post")return r&&r.status==="done_post";if(filter==="cancel_fee")return r&&(r.status==="suspended"||r.status==="cancelled")&&Number(r.cancelFee)>0;if(filter==="pending")return b.settlementStatus!=="completed";if(filter==="completed")return b.settlementStatus==="completed";return true;});
  return <div className="fade-in space-y-4">
    <div className="flex items-center justify-between"><h2 className="text-xl font-bold text-gray-900">예약 / 정산 관리</h2><button onClick={()=>exportSettlement(bookings,helpers,requests)} className="px-3 py-1.5 rounded-lg text-xs font-medium bg-green-50 text-green-700 border border-green-200 hover:bg-green-100 transition flex items-center gap-1">{"\u{1F4E5}"} 엑셀</button></div>
    <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
      {[{l:"총 예약금",v:totals.deposit,c:"text-indigo-600"},{l:"총 원금",v:totals.baseFee,c:"text-gray-800"},{l:"총 추가금",v:totals.extraFee,c:"text-orange-600"},{l:"중도/취소 수수료",v:totals.cancelFee,c:"text-red-600"},{l:"총액",v:totals.grandTotal,c:"text-green-600"}].map((s,i)=><div key={i} className="bg-white rounded-xl border border-gray-100 p-4 text-center"><p className="text-xs text-gray-500 mb-1">{s.l}</p><p className={`font-bold text-lg ${s.c}`}>{s.v.toLocaleString()}원</p></div>)}
    </div>
    <div className="flex gap-2 flex-wrap">{[["all","전체"],["done_post","완료(정산후)"],["cancel_fee","중단/취소(수수료)"],["pending","정산대기"],["completed","정산완료"]].map(([v,l])=><button key={v} onClick={()=>setFilter(v)} className={`px-3 py-1 rounded-full text-xs font-medium transition ${filter===v?"bg-indigo-600 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>{l}</button>)}</div>
    {filtered.length===0?<p className="text-sm text-gray-400 py-8 text-center">정산 대상 내역이 없습니다</p>:<div className="space-y-3">{filtered.slice().reverse().map(b=>{
      const r=requests.find(x=>x.id===b.requestId);const h=helpers.find(x=>x.id===b.helperId);
      const rCancelFee=r?Number(r.cancelFee)||0:0;const rBaseFee=r?Number(r.baseFee)||0:0;const rExtraFee=r?Number(r.extraFee)||0:0;const rDeposit=r?Number(r.deposit)||0:0;const rGrandTotal=rBaseFee+rExtraFee;
      const hours=b.startTime&&b.endTime?Math.max(1,(parseInt(b.endTime)-parseInt(b.startTime))):8;const bkFee=b.fee||hours*15000;const commission=Math.round(bkFee*0.1);
      const rStInfo=r?ST[r.status]||ST.applied:ST.applied;
      return <div key={b.id} className="bg-white rounded-xl border border-gray-100 p-5 space-y-3">
        <div className="flex items-center justify-between"><div><p className="font-semibold text-sm">{r?r.name:"?"} {"\u2192"} {h?h.name:"미배정"}</p><p className="text-xs text-gray-500">{b.startDate||"?"} ~ {b.endDate||"?"} | {b.startTime}~{b.endTime}</p></div><div className="flex items-center gap-2"><span className={`px-2 py-0.5 rounded-full text-xs font-bold ${rStInfo.c}`}>{rStInfo.l}</span><span className={`px-2 py-0.5 rounded-full text-xs font-bold ${b.settlementStatus==="completed"?"bg-green-100 text-green-700":"bg-orange-100 text-orange-700"}`}>{b.settlementStatus==="completed"?"정산완료":"정산대기"}</span></div></div>
        <div className="grid grid-cols-3 gap-4 text-center bg-gray-50 rounded-lg p-3">
          <div><p className="text-xs text-gray-500">예약 금액</p><p className="font-bold text-sm">{bkFee.toLocaleString()}원</p></div>
          <div><p className="text-xs text-gray-500">수수료(10%)</p><p className="font-bold text-sm text-red-500">{commission.toLocaleString()}원</p></div>
          <div><p className="text-xs text-gray-500">지급액</p><p className="font-bold text-sm text-green-600">{(bkFee-commission).toLocaleString()}원</p></div>
        </div>
        {rCancelFee>0&&<div className="bg-red-50 rounded-lg p-3 text-center"><p className="text-xs text-red-500">중도/취소 수수료</p><p className="font-bold text-sm text-red-600">{rCancelFee.toLocaleString()}원</p></div>}
        {b.memo&&<div className="bg-gray-50 rounded-lg p-3"><p className="text-xs text-gray-500 mb-1">{"\u{1F4CC}"} 메모</p><p className="text-xs text-gray-700 whitespace-pre-wrap">{b.memo}</p></div>}
        <div className="flex gap-2 flex-wrap">
          {b.settlementStatus!=="completed"&&<Btn v="success" onClick={()=>updateBooking(b.id,{settlementStatus:"completed",fee:bkFee})}>정산 완료</Btn>}
          <Btn v="secondary" onClick={()=>{setMemoId(b.id);setMemoText("");}}>메모 추가</Btn>
        </div>
        {memoId===b.id&&<div className="flex gap-2 mt-2"><textarea value={memoText} onChange={e=>setMemoText(e.target.value)} rows={2} placeholder="메모 입력..." className="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm resize-none"/><Btn onClick={()=>saveBkMemo(b.id)} disabled={!memoText.trim()} cls="self-end">저장</Btn></div>}
      </div>;
    })}</div>}
  </div>;
}

/* ═══════════════════════════════
   6. Helper Schedule - Calendar
   ═══════════════════════════════ */
function HelperSchedule({helpers,bookings,requests,reload}){
  const today=new Date();const [weekOffset,setWeekOffset]=useState(0);
  const weekStart=getWeekStart(addDays(today,weekOffset*7));
  const days=Array.from({length:14},(_,i)=>fmt(addDays(weekStart,i)));
  const getCell=(hId,day)=>(bookings||[]).filter(b=>b.helperId===hId&&b.status==="active"&&b.startDate&&b.endDate&&day>=b.startDate&&day<=b.endDate).map(b=>{const r=(requests||[]).find(x=>x.id===b.requestId);return {...b,request:r};});
  return <div className="fade-in space-y-4">
    <div className="flex items-center justify-between"><h2 className="text-xl font-bold text-gray-900">도우미 일정 (달력)</h2>
      <div className="flex items-center gap-2"><Btn v="secondary" onClick={()=>setWeekOffset(w=>w-2)}>{"\u25C0"} 이전</Btn><Btn v="secondary" onClick={()=>setWeekOffset(0)}>오늘</Btn><Btn v="secondary" onClick={()=>setWeekOffset(w=>w+2)}>다음 {"\u25B6"}</Btn></div>
    </div>
    <div className="bg-white rounded-xl border border-gray-100 overflow-x-auto">
      <table className="w-full text-xs" style={{minWidth:"900px"}}>
        <thead><tr className="bg-gray-50">
          <th className="sticky left-0 bg-gray-50 z-10 px-3 py-2 text-left font-semibold text-gray-700 border-b border-r border-gray-200" style={{minWidth:"120px"}}>도우미</th>
          {days.map(d=>{const dt=new Date(d);const isToday=d===fmt(today);const isSun=dt.getDay()===0;const isSat=dt.getDay()===6;return <th key={d} className={`px-1 py-2 text-center border-b border-gray-200 font-medium ${isToday?"bg-indigo-50 text-indigo-700":isSun?"text-red-500":isSat?"text-blue-500":"text-gray-600"}`} style={{minWidth:"60px"}}><div>{d.slice(5)}</div><div className="text-xs font-normal">{WDAY[dt.getDay()]}</div></th>;})}
        </tr></thead>
        <tbody>{helpers.map(h=><tr key={h.id} className="border-t border-gray-100 hover:bg-gray-50">
          <td className="sticky left-0 bg-white z-10 px-3 py-2 border-r border-gray-200"><div className="font-semibold">{h.name}</div><div className="text-gray-400">{h.area}</div></td>
          {days.map(d=>{const cell=getCell(h.id,d);return <td key={d} className="px-1 py-1 text-center border-l border-gray-100">
            {cell.length>0?cell.map((c,i)=><div key={i} className={`rounded px-1 py-0.5 mb-0.5 truncate text-xs ${COLORS[i%COLORS.length]}`} title={`${c.request?c.request.name:"?"} ${c.startTime||""}~${c.endTime||""}`}>{c.request?c.request.name:"?"}</div>):<span className="text-gray-300">-</span>}
          </td>;})}
        </tr>)}</tbody>
      </table>
    </div>
  </div>;
}

/* ═══════════════
   App Shell
   ═══════════════ */
function App(){
  const {requests,helpers,bookings,callRequests,stats,reload}=usePolling(2000);
  const [tab,setTab]=useState("dash");
  const tabs=[{id:"dash",l:"대시보드",icon:"\u{1F4CA}"},{id:"req",l:"신청 관리",icon:"\u{1F4CB}"},{id:"call",l:"전화 상담",icon:"\u{1F4DE}"},{id:"helper",l:"도우미",icon:"\u{1F469}"},{id:"settle",l:"예약/정산",icon:"\u{1F4B0}"},{id:"schedule",l:"일정",icon:"\u{1F4C5}"}];
  return <div className="min-h-screen bg-gray-100">
    <div className="sticky top-0 z-30 bg-white border-b border-gray-200 px-4 py-2 flex items-center gap-4 overflow-x-auto">
      <h1 className="font-bold text-indigo-600 whitespace-nowrap">맘케어 Admin</h1>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={`flex items-center gap-1 px-3 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition ${tab===t.id?"bg-indigo-50 text-indigo-700":"text-gray-500 hover:bg-gray-50"}`}>{t.icon} {t.l}</button>)}
    </div>
    <div className="max-w-7xl mx-auto px-4 py-5">
      {tab==="dash"&&<Dashboard stats={stats} requests={requests} callRequests={callRequests}/>}
      {tab==="req"&&<Requests requests={requests} helpers={helpers} bookings={bookings} reload={reload}/>}
      {tab==="call"&&<CallManage callRequests={callRequests} reload={reload}/>}
      {tab==="helper"&&<Helpers helpers={helpers} reload={reload}/>}
      {tab==="settle"&&<Settlement bookings={bookings} helpers={helpers} requests={requests} reload={reload}/>}
      {tab==="schedule"&&<HelperSchedule helpers={helpers} bookings={bookings} requests={requests} reload={reload}/>}
    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
